name: Shell checks

on:
  push:
  pull_request:

jobs:
  shell-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify preinstalled tooling
        run: |
          set -eu
          command -v shellcheck
          command -v shfmt
          shellcheck --version
          shfmt --version

      - name: Run quality gates
        run: make check
